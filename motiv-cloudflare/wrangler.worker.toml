name = "motiv-cron"
main = "src/cron-worker.ts"
compatibility_date = "2024-09-23"

# Runs at 18:30 UTC = midnight IST (UTC+5:30)
# To change timezone, adjust accordingly: midnight UTC = "0 0 * * *"
[triggers]
crons = ["30 18 * * *"]

[vars]
# Override this in Cloudflare dashboard → Workers → motiv-cron → Settings → Variables
APP_URL = "https://motiv.pages.dev"

# CRON_SECRET must be set as an encrypted secret:
#   wrangler secret put CRON_SECRET --config wrangler.worker.toml
